name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-so:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with frp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26
        run: echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Build libgoproxy.so
        env:
          CC: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
        run: |
          cd go-bridge/goproxy
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            CC=$CC \
            go build -buildmode=c-shared \
            -o ../../app/src/main/jniLibs/arm64-v8a/libgoproxy.so .
          file ../../app/src/main/jniLibs/arm64-v8a/libgoproxy.so

      - name: Build libfrpc.so
        env:
          CC: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
        run: |
          cd go-bridge/frpc
          go mod download
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            CC=$CC \
            go build -buildmode=c-shared \
            -o ../../app/src/main/jniLibs/arm64-v8a/libfrpc.so .
          file ../../app/src/main/jniLibs/arm64-v8a/libfrpc.so

      - name: Upload .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/arm64-v8a/*.so

  build-apk:
    needs: build-so
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download .so artifacts
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyPool-debug
          path: app/build/outputs/apk/debug/app-debug.apk
